<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101418">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>powder studio</title>
<style>
  :root {
    --bg: #101418; --panel: #171c22; --panel2: #1d232b; --line: #2a323c;
    --text: #e6ebf0; --dim: #8a97a5; --accent: #e8a33d; --accent2: #5ec6a8;
    --danger: #e06060; --radius: 10px;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 30;
  }
  header .logo { font-weight: 700; letter-spacing: .3px; }
  header .logo em { color: var(--accent); font-style: normal; }
  header .db { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--dim); white-space: nowrap; }
  .badge.rw { color: var(--accent2); border-color: var(--accent2); }
  button, select, input, textarea {
    font: inherit; color: var(--text); background: var(--panel2);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px;
  }
  button { cursor: pointer; min-height: 40px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #14100a; font-weight: 600; }
  button.danger { color: var(--danger); }
  button:disabled { opacity: .45; cursor: default; }

  .layout { display: flex; flex: 1; min-height: 0; }
  nav {
    width: 230px; background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; padding: 10px; flex-shrink: 0;
  }
  nav h2 { font-size: 11px; text-transform: uppercase; color: var(--dim); margin: 8px 6px; letter-spacing: .1em; }
  nav .tbl {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: 10px 12px; border-radius: 8px; color: var(--text); min-height: 42px;
  }
  nav .tbl:hover { background: var(--panel2); }
  nav .tbl.on { background: var(--panel2); color: var(--accent); font-weight: 600; }

  main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .tabs { display: flex; gap: 4px; padding: 10px 14px 0; }
  .tabs button { border: none; background: none; color: var(--dim); border-bottom: 2px solid transparent; border-radius: 0; padding: 8px 6px; }
  .tabs button.on { color: var(--text); border-bottom-color: var(--accent); }
  section.pane { flex: 1; min-height: 0; overflow: auto; padding: 12px 14px; -webkit-overflow-scrolling: touch; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
  .toolbar .spacer { flex: 1; }
  .muted { color: var(--dim); font-size: 12px; }

  .gridwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); }
  table { border-collapse: collapse; width: 100%; min-width: 480px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 340px; overflow: hidden; text-overflow: ellipsis; }
  th { background: var(--panel); position: sticky; top: 0; cursor: pointer; user-select: none; }
  th .dir { color: var(--accent); }
  tbody tr:hover { background: var(--panel2); }
  td.null { color: var(--dim); font-style: italic; }
  td.num { font-variant-numeric: tabular-nums; }
  tr.rowsel { outline: 1px solid var(--accent); }

  textarea.sql {
    width: 100%; min-height: 130px; font: 13px/1.5 ui-monospace, Consolas, monospace;
    resize: vertical;
  }
  .result-note { margin: 8px 0; }
  .error { color: var(--danger); white-space: pre-wrap; }

  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px; width: min(480px, 92vw);
  }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  dialog h3 { margin: 0 0 12px; }
  dialog form.fields { display: grid; grid-template-columns: minmax(90px, auto) 1fr; gap: 8px 10px; align-items: center; }
  dialog .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  dialog label { color: var(--dim); font-size: 12px; word-break: break-all; }
  .invite-url { font: 12px ui-monospace, Consolas, monospace; background: var(--panel2); padding: 10px; border-radius: 8px; word-break: break-all; user-select: all; }

  #menuBtn { display: none; }
  #scrim { display: none; }

  /* ---- 모바일 (phone) ---- */
  @media (max-width: 760px) {
    #menuBtn { display: inline-flex; align-items: center; }
    nav {
      position: fixed; z-index: 40; top: 0; bottom: 0; left: 0;
      transform: translateX(-105%); transition: transform .18s ease-out;
      width: min(280px, 82vw); padding-top: 14px;
      box-shadow: 8px 0 30px rgba(0,0,0,.4);
    }
    nav.open { transform: none; }
    #scrim.open { display: block; position: fixed; inset: 0; z-index: 35; background: rgba(0,0,0,.45); }
    header .db { display: none; }
    section.pane { padding: 10px; }
    th, td { padding: 10px 12px; }         /* 터치 타깃 */
    .toolbar button, .toolbar select { min-height: 44px; }
  }
</style>
</head>
<body>
<header>
  <button id="menuBtn" title="테이블 목록">☰</button>
  <span class="logo">powder <em>studio</em></span>
  <span class="db" id="dbLabel"></span>
  <span class="badge" id="modeBadge"></span>
  <button id="inviteBtn" style="display:none">초대</button>
</header>

<div class="layout">
  <div id="scrim"></div>
  <nav id="nav"><h2>테이블</h2><div id="tableList"></div></nav>

  <main>
    <div class="tabs">
      <button data-tab="data" class="on">데이터</button>
      <button data-tab="schema">스키마</button>
      <button data-tab="sql" id="sqlTab" style="display:none">SQL</button>
      <button data-tab="ai" id="aiTab" style="display:none">AI ✨</button>
    </div>

    <section class="pane" id="pane-data">
      <div class="toolbar">
        <strong id="curTable">—</strong>
        <span class="muted" id="rowCount"></span>
        <span class="spacer"></span>
        <button id="addBtn" style="display:none">+ 행 추가</button>
        <button id="prevBtn">‹</button>
        <span class="muted" id="pageInfo"></span>
        <button id="nextBtn">›</button>
        <button id="refreshBtn" title="새로고침">⟳</button>
      </div>
      <div class="gridwrap"><table id="grid"><thead></thead><tbody></tbody></table></div>
      <p class="muted" id="dataHint"></p>
    </section>

    <section class="pane" id="pane-schema" hidden>
      <div class="gridwrap"><table id="schemaGrid"><thead></thead><tbody></tbody></table></div>
      <p class="muted" id="fkList"></p>
    </section>

    <section class="pane" id="pane-sql" hidden>
      <textarea class="sql" id="sqlBox" placeholder="SELECT * FROM ..." spellcheck="false"></textarea>
      <div class="toolbar" style="margin-top:8px">
        <button class="primary" id="runQueryBtn">쿼리 실행</button>
        <button id="runExecBtn">문장 실행 (INSERT/UPDATE/DDL)</button>
        <span class="muted">값은 가능하면 바인딩 파라미터로 — 스택 문장은 엔진이 거부합니다</span>
      </div>
      <div class="result-note" id="sqlNote"></div>
      <div class="gridwrap"><table id="sqlGrid"><thead></thead><tbody></tbody></table></div>
    </section>

    <section class="pane" id="pane-ai" hidden>
      <p class="muted" id="aiInfo"></p>
      <textarea class="sql" id="aiTask" style="min-height:80px"
        placeholder="하고 싶은 작업을 적어주세요 — 예: 지난 달 결제 완료 주문의 고객별 매출 상위 10명"></textarea>
      <div class="toolbar" style="margin-top:8px">
        <button class="primary" id="aiGenBtn">SQL 생성 ✨</button>
        <span class="muted" id="aiStatus"></span>
      </div>
      <textarea class="sql" id="aiSql" placeholder="생성된 SQL이 여기 표시됩니다 — 검토 후 실행하세요" spellcheck="false"></textarea>
      <div class="toolbar" style="margin-top:8px">
        <button id="aiRunQueryBtn">조회 실행</button>
        <button id="aiRunExecBtn" class="danger">변경 실행 (INSERT/UPDATE/…)</button>
      </div>
      <div class="result-note" id="aiNote"></div>
      <div class="gridwrap"><table id="aiGrid"><thead></thead><tbody></tbody></table></div>
    </section>
  </main>
</div>

<dialog id="rowDlg">
  <h3 id="rowDlgTitle">행 편집</h3>
  <form class="fields" id="rowFields" method="dialog"></form>
  <div class="actions">
    <button id="rowDeleteBtn" class="danger">삭제</button>
    <span style="flex:1"></span>
    <button id="rowCancelBtn">취소</button>
    <button class="primary" id="rowSaveBtn">저장</button>
  </div>
</dialog>

<dialog id="inviteDlg">
  <h3>초대 링크 만들기</h3>
  <p class="muted">링크를 받은 사람은 이 대시보드에 바로 접속합니다. 인터넷 공유는
  <code>--host 0.0.0.0</code> + 포트포워딩/터널이 필요합니다.</p>
  <div class="toolbar">
    <select id="inviteMode">
      <option value="ro">읽기 전용 (탐색만)</option>
      <option value="rw">읽기·쓰기 (편집 + SQL)</option>
    </select>
    <button class="primary" id="inviteMakeBtn">발급</button>
  </div>
  <div class="invite-url" id="inviteUrl" hidden></div>
  <div class="actions"><button id="inviteCloseBtn">닫기</button></div>
</dialog>

<script>
"use strict";
const token = new URLSearchParams(location.search).get("t") || "";
const $ = (id) => document.getElementById(id);
const state = { meta: null, table: null, page: 0, limit: 50, order: "", dir: "asc", rows: [], columns: [], total: 0 };

async function api(path, opts = {}) {
  const sep = path.includes("?") ? "&" : "?";
  const res = await fetch(path + sep + "t=" + encodeURIComponent(token), opts);
  const body = await res.json().catch(() => ({ error: "bad response" }));
  if (!res.ok) throw new Error(body.error || res.status);
  return body;
}
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function cellHtml(v) {
  if (v === null || v === undefined) return '<td class="null">NULL</td>';
  if (typeof v === "number") return `<td class="num">${v}</td>`;
  if (typeof v === "boolean") return `<td class="num">${v}</td>`;
  return `<td title="${esc(v)}">${esc(v)}</td>`;
}
function renderGrid(tableEl, columns, rows, onRowClick) {
  tableEl.querySelector("thead").innerHTML =
    "<tr>" + columns.map((c) => `<th data-col="${esc(c)}">${esc(c)}${state.order === c ? ` <span class="dir">${state.dir === "asc" ? "▲" : "▼"}</span>` : ""}</th>`).join("") + "</tr>";
  tableEl.querySelector("tbody").innerHTML =
    rows.map((r, i) => `<tr data-i="${i}">` + columns.map((c) => cellHtml(r[c])).join("") + "</tr>").join("");
  if (onRowClick) tableEl.querySelectorAll("tbody tr").forEach((tr) => (tr.onclick = () => onRowClick(+tr.dataset.i)));
}

// ---- meta / nav ------------------------------------------------------------
async function loadMeta() {
  state.meta = await api("/api/meta");
  $("dbLabel").textContent = state.meta.db + " · " + state.meta.flavor;
  const b = $("modeBadge");
  b.textContent = state.meta.writable ? (state.meta.mode === "admin" ? "admin" : "읽기·쓰기") : "읽기 전용";
  b.classList.toggle("rw", state.meta.writable);
  if (state.meta.mode === "admin") $("inviteBtn").style.display = "";
  if (state.meta.writable) { $("sqlTab").style.display = ""; $("addBtn").style.display = ""; }
  if (state.meta.writable && state.meta.ai && state.meta.ai.configured) {
    $("aiTab").style.display = "";
    $("aiInfo").textContent = `모델: ${state.meta.ai.model} · 동시 ${state.meta.ai.max}명, 초과분은 선착순 대기`;
  }
  $("tableList").innerHTML = state.meta.tables
    .map((t) => `<button class="tbl" data-t="${esc(t.name)}">${esc(t.name)}</button>`).join("");
  document.querySelectorAll("#tableList .tbl").forEach((el) => (el.onclick = () => { selectTable(el.dataset.t); closeNav(); }));
  if (state.meta.tables.length) selectTable(state.meta.tables[0].name);
}
function tableMeta() { return state.meta.tables.find((t) => t.name === state.table); }

async function selectTable(name) {
  state.table = name; state.page = 0; state.order = ""; state.dir = "asc";
  document.querySelectorAll("#tableList .tbl").forEach((el) => el.classList.toggle("on", el.dataset.t === name));
  $("curTable").textContent = name;
  renderSchema();
  await loadRows();
}

// ---- data tab ---------------------------------------------------------------
async function loadRows() {
  if (!state.table) return;
  const p = new URLSearchParams({ table: state.table, limit: state.limit, offset: state.page * state.limit });
  if (state.order) { p.set("order", state.order); p.set("dir", state.dir); }
  const r = await api("/api/rows?" + p);
  state.rows = r.rows; state.columns = r.columns; state.total = r.total;
  renderGrid($("grid"), r.columns, r.rows, state.meta.writable ? openEdit : null);
  $("grid").querySelectorAll("th").forEach((th) => (th.onclick = () => {
    const c = th.dataset.col;
    if (state.order === c) state.dir = state.dir === "asc" ? "desc" : "asc";
    else { state.order = c; state.dir = "asc"; }
    loadRows();
  }));
  const pages = Math.max(1, Math.ceil(r.total / state.limit));
  $("pageInfo").textContent = `${state.page + 1} / ${pages}`;
  $("rowCount").textContent = `${r.total}행`;
  $("prevBtn").disabled = state.page === 0;
  $("nextBtn").disabled = state.page + 1 >= pages;
  $("dataHint").textContent = state.meta.writable ? "행을 탭하면 편집할 수 있어요." : "";
}
$("prevBtn").onclick = () => { state.page--; loadRows(); };
$("nextBtn").onclick = () => { state.page++; loadRows(); };
$("refreshBtn").onclick = () => loadRows();

// ---- schema tab --------------------------------------------------------------
function renderSchema() {
  const t = tableMeta(); if (!t) return;
  const cols = ["column", "type", "null", "pk"];
  const rows = t.columns.map((c) => ({ column: c.name, type: c.type, null: c.notnull ? "NOT NULL" : "", pk: c.pk > 0 ? "PK" + c.pk : "" }));
  const saved = { order: state.order, dir: state.dir }; state.order = "";
  renderGrid($("schemaGrid"), cols, rows, null);
  Object.assign(state, saved);
  $("fkList").textContent = t.fks.map((f) => `FK: (${f.from.join(", ")}) → ${f.table}(${f.to.join(", ")})`).join("   ") || "";
}

// ---- row editing --------------------------------------------------------------
let editIndex = -1;
function pkWhere(row) {
  const t = tableMeta();
  const pks = t.columns.filter((c) => c.pk > 0).map((c) => c.name);
  const keys = pks.length ? pks : state.columns;   // PK 없으면 전체 컬럼 일치
  const w = {};
  keys.forEach((k) => (w[k] = row[k] ?? null));
  return w;
}
function openEdit(i) { editIndex = i; openRowDialog("행 편집", state.rows[i]); }
$("addBtn").onclick = () => { editIndex = -1; openRowDialog("행 추가", null); };

function openRowDialog(title, row) {
  $("rowDlgTitle").textContent = title;
  const t = tableMeta();
  $("rowFields").innerHTML = t.columns.map((c) => {
    const v = row ? row[c.name] : null;
    const shown = v === null || v === undefined ? "" : String(v);
    return `<label>${esc(c.name)}<br><span class="muted">${esc(c.type)}</span></label>
            <input data-col="${esc(c.name)}" value="${esc(shown)}" placeholder="NULL">`;
  }).join("");
  $("rowDeleteBtn").style.display = row ? "" : "none";
  $("rowDlg").showModal();
}
function fieldValues() {
  const t = tableMeta(); const out = {};
  $("rowFields").querySelectorAll("input").forEach((inp) => {
    const col = t.columns.find((c) => c.name === inp.dataset.col);
    const raw = inp.value;
    if (raw === "") { out[inp.dataset.col] = null; return; }
    const ty = (col.type || "").toUpperCase();
    if (/INT|BIGINT|BIT|BOOL/.test(ty) && /^-?\d+$/.test(raw)) out[inp.dataset.col] = parseInt(raw, 10);
    else if (/REAL|FLOAT|DOUBLE|NUMERIC|DECIMAL/.test(ty) && !isNaN(parseFloat(raw))) out[inp.dataset.col] = parseFloat(raw);
    else if (raw === "true" || raw === "false") out[inp.dataset.col] = raw === "true";
    else out[inp.dataset.col] = raw;
  });
  return out;
}
$("rowSaveBtn").onclick = async (e) => {
  e.preventDefault();
  const values = fieldValues();
  try {
    if (editIndex >= 0) {
      await api("/api/mutate", { method: "POST", body: JSON.stringify({ op: "update", table: state.table, values, where: pkWhere(state.rows[editIndex]) }) });
    } else {
      Object.keys(values).forEach((k) => values[k] === null && delete values[k]);
      await api("/api/mutate", { method: "POST", body: JSON.stringify({ op: "insert", table: state.table, values }) });
    }
    $("rowDlg").close(); await loadRows();
  } catch (err) { alert(err.message); }
};
$("rowDeleteBtn").onclick = async (e) => {
  e.preventDefault();
  if (!confirm("이 행을 삭제할까요?")) return;
  try {
    await api("/api/mutate", { method: "POST", body: JSON.stringify({ op: "delete", table: state.table, where: pkWhere(state.rows[editIndex]) }) });
    $("rowDlg").close(); await loadRows();
  } catch (err) { alert(err.message); }
};
$("rowCancelBtn").onclick = (e) => { e.preventDefault(); $("rowDlg").close(); };

// ---- SQL tab -------------------------------------------------------------------
async function runSql(kind) {
  const sql = $("sqlBox").value.trim(); if (!sql) return;
  $("sqlNote").innerHTML = "";
  try {
    if (kind === "query") {
      const r = await api("/api/query", { method: "POST", body: JSON.stringify({ sql }) });
      const saved = state.order; state.order = "";
      renderGrid($("sqlGrid"), r.columns, r.rows, null);
      state.order = saved;
      $("sqlNote").textContent = `${r.rows.length}행`;
    } else {
      const r = await api("/api/exec", { method: "POST", body: JSON.stringify({ sql }) });
      $("sqlGrid").querySelector("thead").innerHTML = ""; $("sqlGrid").querySelector("tbody").innerHTML = "";
      $("sqlNote").textContent = `적용된 행: ${r.affected}`;
      loadRows();
    }
  } catch (err) { $("sqlNote").innerHTML = `<span class="error">${esc(err.message)}</span>`; }
}
$("runQueryBtn").onclick = () => runSql("query");
$("runExecBtn").onclick = () => runSql("exec");

// ---- AI tab -------------------------------------------------------------------
$("aiGenBtn").onclick = async () => {
  const task = $("aiTask").value.trim(); if (!task) return;
  $("aiGenBtn").disabled = true;
  $("aiStatus").textContent = "생성 중… (혼잡하면 선착순 대기)";
  try {
    const r = await api("/api/ai", { method: "POST", body: JSON.stringify({ task }) });
    $("aiSql").value = r.sql;
    $("aiStatus").textContent = r.queuedBehind > 0 ? `완료 (앞에 ${r.queuedBehind}명 대기했음)` : "완료";
  } catch (err) {
    $("aiStatus").textContent = "";
    $("aiNote").innerHTML = `<span class="error">${esc(err.message)}</span>`;
  } finally { $("aiGenBtn").disabled = false; }
};
async function runAiSql(kind) {
  const sql = $("aiSql").value.trim(); if (!sql) return;
  $("aiNote").innerHTML = "";
  try {
    if (kind === "query") {
      const r = await api("/api/query", { method: "POST", body: JSON.stringify({ sql }) });
      const saved = state.order; state.order = "";
      renderGrid($("aiGrid"), r.columns, r.rows, null);
      state.order = saved;
      $("aiNote").textContent = `${r.rows.length}행`;
    } else {
      if (!confirm("생성된 변경 SQL을 실행할까요?\n\n" + sql)) return;
      const r = await api("/api/exec", { method: "POST", body: JSON.stringify({ sql }) });
      $("aiNote").textContent = `적용된 행: ${r.affected}`;
      loadRows();
    }
  } catch (err) { $("aiNote").innerHTML = `<span class="error">${esc(err.message)}</span>`; }
}
$("aiRunQueryBtn").onclick = () => runAiSql("query");
$("aiRunExecBtn").onclick = () => runAiSql("exec");

// ---- invites ---------------------------------------------------------------------
$("inviteBtn").onclick = () => { $("inviteUrl").hidden = true; $("inviteDlg").showModal(); };
$("inviteMakeBtn").onclick = async (e) => {
  e.preventDefault();
  try {
    const r = await api("/api/invite", { method: "POST", body: JSON.stringify({ mode: $("inviteMode").value }) });
    const url = location.origin + "/?t=" + r.token;
    const el = $("inviteUrl"); el.textContent = url; el.hidden = false;
    try { await navigator.clipboard.writeText(url); el.textContent = url + "   (복사됨)"; } catch {}
  } catch (err) { alert(err.message); }
};
$("inviteCloseBtn").onclick = (e) => { e.preventDefault(); $("inviteDlg").close(); };

// ---- tabs / mobile nav --------------------------------------------------------------
document.querySelectorAll(".tabs button").forEach((b) => (b.onclick = () => {
  document.querySelectorAll(".tabs button").forEach((x) => x.classList.toggle("on", x === b));
  ["data", "schema", "sql", "ai"].forEach((n) => ($("pane-" + n).hidden = b.dataset.tab !== n));
}));
const closeNav = () => { $("nav").classList.remove("open"); $("scrim").classList.remove("open"); };
$("menuBtn").onclick = () => { $("nav").classList.toggle("open"); $("scrim").classList.toggle("open"); };
$("scrim").onclick = closeNav;

loadMeta().catch((e) => { document.body.innerHTML = `<p style="padding:20px" class="error">연결 실패: ${esc(e.message)}</p>`; });
</script>
</body>
</html>
