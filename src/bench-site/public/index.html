<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ncode 성능 테스트</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d12;
    --panel: #12151c;
    --border: #232838;
    --text: #e6e9f0;
    --muted: #8892a6;
    --accent: #5fd3a3;
    --accent2: #6ea8fe;
    --accent3: #f2a154;
    --danger: #e5686b;
    --drizzle: #9b8bf4;
    --prisma: #4fb8c9;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f9;
      --panel: #ffffff;
      --border: #e1e4ec;
      --text: #1b1f27;
      --muted: #656d7e;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2.5rem 1.5rem 4rem;
    display: flex;
    justify-content: center;
  }
  main { width: 100%; max-width: 780px; }
  h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
  .subtitle { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; line-height: 1.5; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
  input[type="number"] {
    width: 9rem;
    padding: 0.5rem 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 0.95rem;
  }
  button {
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent2);
    color: #06111f;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: wait; }
  button:hover:not(:disabled) { filter: brightness(1.08); }

  .status { margin-top: 0.9rem; font-size: 0.85rem; color: var(--muted); min-height: 1.2em; }

  .bars { display: flex; flex-direction: column; gap: 0.9rem; margin-top: 0.5rem; }
  .bar-row { display: grid; grid-template-columns: 150px 1fr 90px; gap: 0.75rem; align-items: center; }
  .bar-label { font-size: 0.85rem; color: var(--text); }
  .bar-label small { display: block; color: var(--muted); font-size: 0.72rem; }
  .bar-track { background: var(--border); border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .bar-value { font-variant-numeric: tabular-nums; font-size: 0.85rem; text-align: right; color: var(--text); }

  .fill-raw { background: var(--accent); }
  .fill-query { background: var(--accent2); }
  .fill-torows { background: var(--accent3); }
  .fill-baseline { background: var(--danger); }
  .fill-drizzle { background: var(--drizzle); }
  .fill-prisma { background: var(--prisma); }

  .speedup {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--muted);
  }
  .speedup b { color: var(--accent); font-size: 1.05rem; }
  .verified { font-size: 0.8rem; margin-top: 0.5rem; }
  .verified.ok { color: var(--accent); }
  .verified.bad { color: var(--danger); }
  footer { color: var(--muted); font-size: 0.78rem; text-align: center; margin-top: 2rem; }
</style>
</head>
<body>
<main>
  <h1>Ncode 성능 테스트</h1>
  <p class="subtitle">
    같은 SQLite 결과 집합을 다섯 가지 경로로 JS까지 가져오는 시간을 비교합니다:
    Ncode의 zero-copy 컬럼 버퍼 직접 접근, 같은 버퍼를 행 객체로 변환(<code>toRows()</code>),
    Node 내장 <code>node:sqlite</code>의 <code>.all()</code>, 그리고
    <b>Drizzle ORM</b>과 <b>Prisma ORM</b>(둘 다 better-sqlite3 기반)의 조회 결과.
  </p>

  <div class="panel">
    <div class="controls">
      <div>
        <label for="rows">행 수</label>
        <input id="rows" type="number" min="1" max="200000" value="20000" step="1000" />
      </div>
      <div>
        <label for="trials">반복 횟수</label>
        <input id="trials" type="number" min="1" max="20" value="5" step="1" />
      </div>
      <button id="run">벤치마크 실행</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="panel" id="results" hidden>
    <div class="bars" id="bars"></div>
    <div class="speedup" id="speedup"></div>
    <div class="verified" id="verified"></div>
  </div>

  <footer>결과는 중앙값(median) 기준이며, 각 실행은 독립적인 in-memory DB에 데이터를 새로 적재한 뒤 측정합니다.</footer>
</main>

<script>
  const rowsInput = document.getElementById("rows");
  const trialsInput = document.getElementById("trials");
  const runBtn = document.getElementById("run");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");
  const barsEl = document.getElementById("bars");
  const speedupEl = document.getElementById("speedup");
  const verifiedEl = document.getElementById("verified");

  const SERIES = [
    { key: "ncodeRawAccess", label: "Ncode", sub: "zero-copy 직접 접근", fill: "fill-raw" },
    { key: "ncodeQuery", label: "Ncode", sub: "질의 + NCB 디코드", fill: "fill-query" },
    { key: "ncodeToRows", label: "Ncode", sub: "toRows() 객체화", fill: "fill-torows" },
    { key: "baselineAll", label: "node:sqlite", sub: ".all() 객체 반환", fill: "fill-baseline" },
    { key: "drizzleAll", label: "Drizzle ORM", sub: "select().orderBy()", fill: "fill-drizzle" },
    { key: "prismaAll", label: "Prisma ORM", sub: "findMany()", fill: "fill-prisma" },
  ];

  function render(data) {
    resultsEl.hidden = false;
    const max = Math.max(...SERIES.map((s) => data.metrics[s.key].medianMs), 0.001);

    barsEl.innerHTML = SERIES.map((s) => {
      const m = data.metrics[s.key];
      const pct = Math.max((m.medianMs / max) * 100, 2);
      return `
        <div class="bar-row">
          <div class="bar-label">${s.label}<small>${s.sub}</small></div>
          <div class="bar-track"><div class="bar-fill ${s.fill}" style="width:${pct}%"></div></div>
          <div class="bar-value">${m.medianMs.toFixed(2)} ms</div>
        </div>`;
    }).join("");

    const rawMs = data.metrics.ncodeRawAccess.medianMs;
    const slowest = SERIES.filter((s) => s.key !== "ncodeRawAccess").reduce((worst, s) =>
      data.metrics[s.key].medianMs > data.metrics[worst.key].medianMs ? s : worst,
    );
    const slowestMs = data.metrics[slowest.key].medianMs;
    const drizzleRatio = data.metrics.drizzleAll.medianMs / Math.max(rawMs, 0.001);
    const prismaRatio = data.metrics.prismaAll.medianMs / Math.max(rawMs, 0.001);
    speedupEl.innerHTML =
      `${data.rows.toLocaleString()}행, ${data.trials}회 반복 중앙값 · Ncode zero-copy 접근 대비 ` +
      `Drizzle <b>${drizzleRatio.toFixed(2)}배</b>, Prisma <b>${prismaRatio.toFixed(2)}배</b> 느림 ` +
      `(가장 느린 경로: ${slowest.label} ${slowest.sub}, ${slowestMs.toFixed(2)} ms)`;

    verifiedEl.textContent = data.verified
      ? "✓ 모든 경로가 동일한 데이터(체크섬 일치) 확인됨"
      : "⚠ 체크섬 불일치 — 결과를 신뢰할 수 없습니다";
    verifiedEl.className = "verified " + (data.verified ? "ok" : "bad");
  }

  async function run() {
    const rows = Number(rowsInput.value);
    const trials = Number(trialsInput.value);
    runBtn.disabled = true;
    statusEl.textContent = `실행 중... (${rows.toLocaleString()}행 × ${trials}회)`;
    try {
      const res = await fetch(`/api/bench?rows=${rows}&trials=${trials}`);
      if (!res.ok) throw new Error((await res.json()).error ?? res.statusText);
      const data = await res.json();
      render(data);
      statusEl.textContent = "완료";
    } catch (err) {
      statusEl.textContent = "오류: " + err.message;
    } finally {
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener("click", run);
  run();
</script>
</body>
</html>
